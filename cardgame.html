<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game | Gra pamięciowa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        :root {
            --bg: #f1f5f9;
            --surface: #ffffff;
            --text: #0f172a;
            --text-light: #475569;
            --border: #e2e8f0;
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --success: #10b981;
            --danger: #ef4444;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        body.dark {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --border: #334155;
            --card-bg: #1e293b;
            --card-border: #334155;
        }

        body {
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
        }

        /* Header */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            padding: 1rem 0;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .header-actions {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .theme-btn, .reset-btn, .rank-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            color: var(--text);
            font-weight: 500;
            transition: all 0.2s;
        }

        .reset-btn:hover, .rank-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Panel gry */
        .game-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 1.2rem;
            margin: 1.5rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .stats {
            display: flex;
            gap: 1.5rem;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: monospace;
        }

        .difficulty-select {
            display: flex;
            gap: 0.5rem;
        }

        .difficulty-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .difficulty-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Siatka kart */
        .game-board {
            display: grid;
            justify-content: center;
            gap: 0.8rem;
            margin: 2rem 0;
            transition: all 0.3s;
        }

        .game-board.easy {
            grid-template-columns: repeat(4, minmax(80px, 100px));
        }

        .game-board.medium {
            grid-template-columns: repeat(4, minmax(80px, 100px));
        }

        .game-board.hard {
            grid-template-columns: repeat(6, minmax(70px, 85px));
        }

        .card {
            aspect-ratio: 1 / 1;
            background: linear-gradient(145deg, var(--primary), var(--primary-dark));
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            transition: all 0.2s ease;
            transform-style: preserve-3d;
            box-shadow: var(--shadow);
            border: 2px solid transparent;
        }

        .card.flipped, .card.matched {
            background: var(--card-bg);
            border: 2px solid var(--primary);
            transform: scale(0.98);
        }

        .card.matched {
            border-color: var(--success);
            cursor: default;
            opacity: 0.7;
        }

        .card:hover:not(.matched) {
            transform: scale(1.02);
            box-shadow: var(--shadow-lg);
        }

        .card .card-front {
            display: none;
        }

        .card.flipped .card-front, .card.matched .card-front {
            display: block;
        }

        .card .card-back {
            display: block;
            font-size: 2rem;
        }

        .card.flipped .card-back, .card.matched .card-back {
            display: none;
        }

        /* Ranking */
        .rankings {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.2rem;
            margin-top: 1.5rem;
        }

        .rankings h3 {
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .rank-table {
            width: 100%;
            border-collapse: collapse;
        }

        .rank-table th, .rank-table td {
            padding: 0.6rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .rank-table th {
            color: var(--text-light);
            font-weight: 500;
            font-size: 0.8rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--surface);
            border-radius: 28px;
            padding: 2rem;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .modal-content h2 {
            margin-bottom: 1rem;
        }

        .modal-content p {
            margin: 0.5rem 0;
            font-size: 1.2rem;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .win-emoji {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--text-light);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }

        @media (max-width: 700px) {
            .game-board.easy { grid-template-columns: repeat(4, minmax(70px, 80px)); gap: 0.5rem; }
            .game-board.medium { grid-template-columns: repeat(4, minmax(70px, 80px)); gap: 0.5rem; }
            .game-board.hard { grid-template-columns: repeat(4, minmax(70px, 80px)); gap: 0.5rem; }
            .card { font-size: 1.5rem; }
            .game-panel { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="container">
        <div class="header-content">
            <div class="logo">🎴 Memory Game</div>
            <div class="header-actions">
                <button class="theme-btn" id="themeBtn">🌙</button>
                <button class="rank-btn" id="rankBtn">🏆 Ranking</button>
                <button class="reset-btn" id="resetBtn">🔄 Nowa gra</button>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <!-- Panel gry -->
    <div class="game-panel">
        <div class="stats">
            <div class="stat">
                <div class="stat-label">Ruchy</div>
                <div class="stat-value" id="moves">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Czas</div>
                <div class="stat-value" id="timer">00:00</div>
            </div>
            <div class="stat">
                <div class="stat-label">Dopasowane</div>
                <div class="stat-value" id="matchedPairs">0</div>
            </div>
        </div>
        <div class="difficulty-select">
            <button class="difficulty-btn" data-diff="easy">Łatwy (4x3)</button>
            <button class="difficulty-btn active" data-diff="medium">Średni (4x4)</button>
            <button class="difficulty-btn" data-diff="hard">Trudny (6x6)</button>
        </div>
    </div>

    <!-- Plansza gry -->
    <div class="game-board medium" id="gameBoard"></div>

    <!-- Ranking -->
    <div class="rankings" id="rankingsSection">
        <h3>🏆 Najlepsze wyniki <span id="rankDiff">(Średni)</span></h3>
        <table class="rank-table" id="rankTable">
            <thead>
                <tr><th>#</th><th>Ruchy</th><th>Czas</th><th>Data</th></tr>
            </thead>
            <tbody id="rankBody"></tbody>
        </table>
    </div>
</div>

<footer>
    <p>Memory Game | Dopasuj wszystkie pary kart</p>
</footer>

<!-- Modal wygranej -->
<div id="winModal" class="modal">
    <div class="modal-content">
        <div class="win-emoji">🎉</div>
        <h2>Gratulacje!</h2>
        <p>Ukończyłeś grę w <strong id="winMoves">0</strong> ruchach</p>
        <p>Czas: <strong id="winTime">00:00</strong></p>
        <p id="newRecordMsg" style="color: var(--success);"></p>
        <div class="modal-buttons">
            <button class="theme-btn" id="closeWinModal">Zamknij</button>
            <button class="reset-btn" id="playAgainBtn">Zagraj ponownie</button>
        </div>
    </div>
</div>

<script>
    // ==================== KONFIGURACJA ====================
    const ICONS = [
        "🐶", "🐱", "🐭", "🐹", "🐰", "🦊", "🐻", "🐼", "🐨", "🐯", "🦁", "🐮",
        "🐷", "🐸", "🐵", "🐔", "🐧", "🐦", "🐴", "🐝", "🐛", "🦋", "🐌", "🐞"
    ];

    const DIFFICULTY = {
        easy: { rows: 3, cols: 4, pairs: 6 },
        medium: { rows: 4, cols: 4, pairs: 8 },
        hard: { rows: 6, cols: 6, pairs: 18 }
    };

    let currentDifficulty = "medium";
    let cards = [];
    let flippedCards = [];
    let matchedPairs = 0;
    let moves = 0;
    let gameStarted = false;
    let timerInterval = null;
    let seconds = 0;
    let lockBoard = false;
    let totalPairs = DIFFICULTY.medium.pairs;

    // Ranking dla każdego poziomu
    let rankings = {
        easy: [],
        medium: [],
        hard: []
    };

    // ==================== FUNKCJE ====================
    function loadRankings() {
        const saved = localStorage.getItem("memory_rankings");
        if (saved) {
            rankings = JSON.parse(saved);
        } else {
            // Przykładowe wyniki
            rankings = {
                easy: [{ moves: 12, time: 45, date: "2026-06-01" }],
                medium: [{ moves: 24, time: 78, date: "2026-06-02" }],
                hard: [{ moves: 48, time: 180, date: "2026-06-03" }]
            };
        }
    }

    function saveRankings() {
        localStorage.setItem("memory_rankings", JSON.stringify(rankings));
    }

    function formatTime(sec) {
        const mins = Math.floor(sec / 60);
        const remainSec = sec % 60;
        return `${mins.toString().padStart(2, "0")}:${remainSec.toString().padStart(2, "0")}`;
    }

    function updateUI() {
        document.getElementById("moves").innerText = moves;
        document.getElementById("timer").innerText = formatTime(seconds);
        document.getElementById("matchedPairs").innerText = `${matchedPairs}/${totalPairs}`;
    }

    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    function startTimer() {
        if (timerInterval) stopTimer();
        timerInterval = setInterval(() => {
            if (gameStarted && !lockBoard && matchedPairs < totalPairs) {
                seconds++;
                document.getElementById("timer").innerText = formatTime(seconds);
            }
        }, 1000);
    }

    function resetTimer() {
        seconds = 0;
        document.getElementById("timer").innerText = "00:00";
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function initCards() {
        const config = DIFFICULTY[currentDifficulty];
        totalPairs = config.pairs;
        const selectedIcons = ICONS.slice(0, totalPairs);
        let deck = [...selectedIcons, ...selectedIcons];
        deck = shuffleArray(deck);
        
        cards = deck.map((icon, index) => ({
            id: index,
            icon: icon,
            flipped: false,
            matched: false
        }));
        
        matchedPairs = 0;
        moves = 0;
        gameStarted = false;
        flippedCards = [];
        lockBoard = false;
        resetTimer();
        stopTimer();
        updateUI();
        renderBoard();
    }

    function renderBoard() {
        const board = document.getElementById("gameBoard");
        board.className = `game-board ${currentDifficulty}`;
        
        const config = DIFFICULTY[currentDifficulty];
        board.style.gridTemplateColumns = `repeat(${config.cols}, minmax(70px, 100px))`;
        
        board.innerHTML = cards.map(card => `
            <div class="card ${card.flipped ? 'flipped' : ''} ${card.matched ? 'matched' : ''}" data-id="${card.id}">
                <div class="card-front">${card.icon}</div>
                <div class="card-back">?</div>
            </div>
        `).join("");
        
        document.querySelectorAll(".card").forEach(cardEl => {
            cardEl.addEventListener("click", () => handleCardClick(parseInt(cardEl.dataset.id)));
        });
    }

    function handleCardClick(id) {
        if (lockBoard) return;
        
        const card = cards[id];
        if (card.matched) return;
        if (card.flipped) return;
        if (flippedCards.length === 2) return;
        
        // Rozpoczęcie gry przy pierwszej karcie
        if (!gameStarted) {
            gameStarted = true;
            startTimer();
        }
        
        card.flipped = true;
        flippedCards.push(card);
        renderBoard();
        
        if (flippedCards.length === 2) {
            moves++;
            updateUI();
            checkMatch();
        }
    }

    function checkMatch() {
        const [card1, card2] = flippedCards;
        
        if (card1.icon === card2.icon) {
            // Dopasowanie
            card1.matched = true;
            card2.matched = true;
            card1.flipped = true;
            card2.flipped = true;
            matchedPairs++;
            updateUI();
            flippedCards = [];
            renderBoard();
            
            // Sprawdzenie wygranej
            if (matchedPairs === totalPairs) {
                gameWon();
            }
        } else {
            // Błąd - blokada i odwrócenie
            lockBoard = true;
            setTimeout(() => {
                card1.flipped = false;
                card2.flipped = false;
                flippedCards = [];
                lockBoard = false;
                renderBoard();
            }, 600);
        }
    }

    function gameWon() {
        stopTimer();
        gameStarted = false;
        
        const timeInSeconds = seconds;
        const timeFormatted = formatTime(timeInSeconds);
        
        document.getElementById("winMoves").innerText = moves;
        document.getElementById("winTime").innerText = timeFormatted;
        
        // Sprawdzenie rekordu
        const currentRankings = rankings[currentDifficulty];
        const isRecord = currentRankings.length === 0 || moves < currentRankings[0].moves || 
                        (moves === currentRankings[0].moves && timeInSeconds < currentRankings[0].time);
        
        if (isRecord && currentRankings.length > 0) {
            document.getElementById("newRecordMsg").innerText = "🏆 Nowy rekord! 🏆";
        } else {
            document.getElementById("newRecordMsg").innerText = "";
        }
        
        // Dodanie wyniku do rankingu
        const newScore = {
            moves: moves,
            time: timeInSeconds,
            date: new Date().toLocaleDateString()
        };
        
        currentRankings.push(newScore);
        currentRankings.sort((a, b) => {
            if (a.moves !== b.moves) return a.moves - b.moves;
            return a.time - b.time;
        });
        // Zachowaj tylko top 10
        rankings[currentDifficulty] = currentRankings.slice(0, 10);
        saveRankings();
        updateRankingTable();
        
        document.getElementById("winModal").style.display = "flex";
    }

    function updateRankingTable() {
        const rankBody = document.getElementById("rankBody");
        const currentRankings = rankings[currentDifficulty];
        const diffNames = { easy: "Łatwy", medium: "Średni", hard: "Trudny" };
        document.getElementById("rankDiff").innerText = `(${diffNames[currentDifficulty]})`;
        
        if (currentRankings.length === 0) {
            rankBody.innerHTML = '<tr><td colspan="4">Brak wyników</td></tr>';
            return;
        }
        
        rankBody.innerHTML = currentRankings.map((score, idx) => `
            <tr>
                <td>${idx + 1}</td>
                <td>${score.moves}</td>
                <td>${formatTime(score.time)}</td>
                <td>${score.date}</td>
            </tr>
        `).join("");
    }

    function resetGame() {
        stopTimer();
        gameStarted = false;
        seconds = 0;
        moves = 0;
        matchedPairs = 0;
        flippedCards = [];
        lockBoard = false;
        updateUI();
        initCards();
    }

    function changeDifficulty(difficulty) {
        currentDifficulty = difficulty;
        totalPairs = DIFFICULTY[difficulty].pairs;
        
        // Aktualizacja aktywnych przycisków
        document.querySelectorAll(".difficulty-btn").forEach(btn => {
            btn.classList.remove("active");
            if (btn.dataset.diff === difficulty) btn.classList.add("active");
        });
        
        resetGame();
        updateRankingTable();
    }

    // ==================== MODALE ====================
    function closeWinModal() {
        document.getElementById("winModal").style.display = "none";
    }

    function showRankingModal() {
        // Ranking jest zawsze widoczny na stronie, ale przewiń do niego
        document.getElementById("rankingsSection").scrollIntoView({ behavior: "smooth" });
    }

    // ==================== DARK MODE ====================
    function setupTheme() {
        const btn = document.getElementById("themeBtn");
        const saved = localStorage.getItem("memory_theme");
        if (saved === "dark") {
            document.body.classList.add("dark");
            btn.textContent = "☀️";
        }
        btn.addEventListener("click", () => {
            document.body.classList.toggle("dark");
            const isDark = document.body.classList.contains("dark");
            btn.textContent = isDark ? "☀️" : "🌙";
            localStorage.setItem("memory_theme", isDark ? "dark" : "light");
        });
    }

    // ==================== START ====================
    document.addEventListener("DOMContentLoaded", () => {
        loadRankings();
        initCards();
        updateRankingTable();
        setupTheme();
        
        // Eventy
        document.getElementById("resetBtn").addEventListener("click", resetGame);
        document.getElementById("rankBtn").addEventListener("click", showRankingModal);
        document.getElementById("closeWinModal").addEventListener("click", closeWinModal);
        document.getElementById("playAgainBtn").addEventListener("click", () => {
            closeWinModal();
            resetGame();
        });
        
        document.querySelectorAll(".difficulty-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                changeDifficulty(btn.dataset.diff);
            });
        });
        
        window.addEventListener("click", (e) => {
            if (e.target === document.getElementById("winModal")) {
                closeWinModal();
            }
        });
    });
</script>
</body>
</html>
